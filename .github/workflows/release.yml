name: Build and Release KDT

on:
  push:
    branches: [ master ]

jobs:
  push_to_registry:
    name: Build and Publish KDT
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required to request the OIDC JWT for AWS STS
      contents: write   # required by create-release / upload-release-assets

    env:
      IMAGE_NAME: 'kondukto/kondukto-cli'

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Add SHORT_SHA env property
        id: set_short_sha_variable
        run: |
          echo "SHORT_SHA=`git rev-parse --short HEAD`" >> $GITHUB_ENV

      - name: Get Last Tag
        run: |
          git fetch --prune --unshallow --tags
          echo GIT_TAG=$(git describe --tags --abbrev=0) >> $GITHUB_ENV 

      - name: Get Version Tag
        id: get_version_tag
        run: |
          echo "VERSION_TAG=${{ env.GIT_TAG }}" | cut -d '-' -f 1 >> $GITHUB_ENV  

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: ./go.sum

      - name: Download Dependencies
        run: |
          make -f ${{ github.workspace }}/Makefile tidy

      - name: Build All
        run: |
          make -f ${{ github.workspace }}/Makefile all

      - name: Run Tests
        run: |
          make -f ${{ github.workspace }}/Makefile test

      - name: Run Integration Tests
        run: |
          make -f ${{ github.workspace }}/Makefile integration-test

      - name: Run Linter
        continue-on-error: true
        run: |
          make -f ${{ github.workspace }}/Makefile lint

      - name: Run Nilaway
        run: |
          make -f ${{ github.workspace }}/Makefile nilaway

      - name: Run Vulncheck
        run: |
          make -f ${{ github.workspace }}/Makefile vulncheck

      - name: Show Version
        id: show_version
        run: |
          _release/kdt-linux-amd64 version

      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION_TAG }}
          release_name: Release ${{ env.VERSION_TAG }}
          prerelease: false
          draft: true
          body: |
            Changes in release
            - this

      - name: Upload Release Assets
        id: upload-release-assets
        uses: dwenegar/upload-release-assets@5bc3024cf83521df8ebfadf00ad0c4614fd59148
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ steps.create_release.outputs.id }}
          assets_path: ./_release/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build/Push Tags
        id: docker_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }}-${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ env.SHORT_SHA }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ env.SHORT_SHA }},mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy to S3
        run: |
          aws s3 cp ./get.sh s3://${{ secrets.AWS_S3_BUCKET_ID }}/index.html

      - name: Invalidate CDN
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"          
